name: atlas

services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set atlas http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing atlas/$${MINIO_DEFAULT_BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-atlas-data}
    restart: "no"

  geoserver:
    build:
      context: ./services/geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: ${APP_GEOSERVER_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${APP_GEOSERVER_PASSWORD:-geoserver}
      PROXY_BASE_URL: ${APP_GEOSERVER_PUBLIC_URL:-http://localhost:18081/geoserver}
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/geoserver/web/"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 90s

  api:
    build:
      context: ./services/api
    labels:
      org.opencontainers.image.vendor: ATLAS
      org.opencontainers.image.authors: "徐岸 <toxuan1998@qq.com>"
    restart: unless-stopped
    environment:
      APP_WORK_DIR: /data
      APP_DWG2DXF_CMD: ${APP_DWG2DXF_CMD:-dwg2dxf}
      APP_OGR2OGR_CMD: ${APP_OGR2OGR_CMD:-ogr2ogr}
      APP_TARGET_SRS: ${APP_TARGET_SRS:-EPSG:4326}
      APP_GAUSS_KRUGER_ZONE: ${APP_GAUSS_KRUGER_ZONE:-39}
      APP_ENABLE_GAUSS_KRUGER_TRANSFORM: ${APP_ENABLE_GAUSS_KRUGER_TRANSFORM:-true}
      APP_GEOSERVER_URL: http://geoserver:8080/geoserver
      APP_GEOSERVER_PUBLIC_URL: ${APP_GEOSERVER_PUBLIC_URL:-http://localhost:18081/geoserver}
      APP_GEOSERVER_USER: ${APP_GEOSERVER_USER:-admin}
      APP_GEOSERVER_PASSWORD: ${APP_GEOSERVER_PASSWORD:-geoserver}
      APP_GEOSERVER_WORKSPACE: ${APP_GEOSERVER_WORKSPACE:-atlas}
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      APP_MINIO_SECURE: ${APP_MINIO_SECURE:-false}
      APP_MINIO_PATH_STYLE: ${APP_MINIO_PATH_STYLE:-true}
      APP_MINIO_REGION: ${APP_MINIO_REGION:-}
    volumes:
      - atlas_jobs:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
      geoserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    build:
      context: ./services/web
    labels:
      org.opencontainers.image.vendor: ATLAS
      org.opencontainers.image.authors: "徐岸 <toxuan1998@qq.com>"
    restart: unless-stopped
    ports:
      - "${ATLAS_HOST_PORT:-18081}:80"
    depends_on:
      api:
        condition: service_healthy
      geoserver:
        condition: service_healthy

volumes:
  minio_data:
  geoserver_data:
  atlas_jobs:

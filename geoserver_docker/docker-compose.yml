services:
  geoserver:
    build:
      context: .
    container_name: ${GEOSERVER_CONTAINER_NAME:-dwg2mvt-geoserver}
    restart: unless-stopped
    ports:
      - "${GEOSERVER_HOST_PORT:-18081}:8080"
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      PROXY_BASE_URL: ${GEOSERVER_PUBLIC_URL:-http://localhost:18081/geoserver}
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ${GEOSERVER_SHARED_JOBS_DIR:-./jobs}:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/geoserver/web/"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 90s

volumes:
  geoserver_data:
